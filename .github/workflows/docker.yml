name: Docker Build

on:
  workflow_run:
    workflows: ['Build'] # must match the name from `checks.yml`
    types: [completed]
    branches: [main]

concurrency:
  group: docker-build-main
  cancel-in-progress: true

permissions:
  artifact-metadata: write
  contents: write
  packages: write
  id-token: write
  attestations: write

jobs:
  build_push_docker_images:
    name: Build and push docker image ${{ matrix.image_name }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'

    strategy:
      matrix:
        include:
          - image_name: telli-api
            dockerfile: apps/api/Dockerfile
            image_ref: ghcr.io/fwu-de/telli-api
            sentry_project: ${{ vars.SENTRY_PROJECT_API }}
          - image_name: telli-dialog
            dockerfile: apps/dialog/Dockerfile
            image_ref: ghcr.io/fwu-de/telli-dialog
            sentry_project: ${{ vars.SENTRY_PROJECT_DIALOG }}
          - image_name: telli-admin
            dockerfile: apps/admin/Dockerfile
            image_ref: ghcr.io/fwu-de/telli-admin
            sentry_project: ${{ vars.SENTRY_PROJECT_ADMIN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: docker-build
        uses: docker/build-push-action@v7
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ matrix.sentry_project }}
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          secret-envs: |
            SENTRY_AUTH_TOKEN=SENTRY_AUTH_TOKEN
            SENTRY_ORG=SENTRY_ORG
            SENTRY_PROJECT=SENTRY_PROJECT
          build-args: |
            CI=${CI}
            APP_VERSION=${{ github.sha }}
          tags: |
            ${{ matrix.image_ref }}:latest
            ${{ matrix.image_ref }}:${{ github.sha }}
          push: true
          provenance: mode=max
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate artifact attestation
        uses: actions/attest@v4
        with:
          subject-name: ${{ matrix.image_ref }}
          subject-digest: ${{ steps.docker-build.outputs.digest }}
          push-to-registry: true
